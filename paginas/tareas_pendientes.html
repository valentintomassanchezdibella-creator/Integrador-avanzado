<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="navbar">
            <nav id="nav">
                <ul>
                    <li><a href="../index.html" class="btn-1">Gestion de Incidencias</a></li>
                    <li><a href="./gestion_aula.html" class="btn-1">Gestion de Aulas</a></li>
                    <li><a href="./reservas.html" class="btn-1">Reservas</a></li>
                    <li><a href="./estadisticas.html" class="btn-1">Estadisticas</a></li>
                    <li><a href="./tareas_pendientes.html" class="btn-1 actual">Tareas Pendientes</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <section class="funcionalidades">
        <div class="contenedor">
            <li><button class="btn-2" id="btnFunciones">Crear Tarea</button></li>
            <li><select id="tarea-estado-filtro" onchange="FiltrarEstadoTarea()">
                <option value="">Todos los Estados</option>
                <option value="pendiente">Pendiente</option>
                <option value="proceso">En proceso</option>
                <option value="resuelta">Resuelta</option>
            </select></li>
            
            <li><select id="tarea-prioridad-filtro" onchange="FiltrarPrioridadTarea()">
                <option value="">Todas las prioridades</option>
                <option value="baja">Baja</option>
                <option value="media">Medio</option>
                <option value="alta">Alta</option>
                <option value="urgente">Urgente</option>
            </select></li>
            <li><select id="tarea-vencida-filtro" onchange="FiltrarVencidaTarea()">
                <option value="">Todas las Tareas</option>
                <option value="">Tareas Vencidas</option>
                <option value="">Tareas sin Vencer</option>
            </select></li>
        </div>
    </section>

    <section class="tareas-pendientes">
        <div class="overlay" id="overlay">
            <form id="tareas-formulario">
                <input name="responsable" type="text" placeholder="Responsable">
                <input name="descripcion" type="text" placeholder="Descripcion">
                <input name="fecha" type="date" placeholder="Fecha Limite">
                <select name="estado" id="estado">
                    <option value="pendiente">Pendiente</option>
                    <option value="proceso">En proceso</option>
                    <option value="resuelta">Resuelta</option>
                </select>
                <select id="prioridad" name="prioridad">
                    <option value="baja">Baja</option>
                    <option value="media">Medio</option>
                    <option value="alta">Alta</option>
                    <option value="urgente">Urgente</option>
                </select>
    
                <button>Enviar</button>
            </form>
        </div>
        <div class="tareas-pendientes-container" id="tareas-container">
                        
        </div>
    </section>   

    <script src="../script.js"></script>  
</body>
</html>
