<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="navbar">
            <nav id="nav">
                <ul>
                    <li><a href="../index.html" class="btn-1">Gestion de Incidencias</a></li>
                    <li><a href="./gestion_aula.html" class="btn-1">Gestion de Aulas</a></li>
                    <li><a href="./reservas.html" class="btn-1 actual">Reservas</a></li>

                    <li><a href="./tareas_pendientes.html" class="btn-1">Tareas Pendientes</a></li>

            </nav>
        </div>

    <section class="funcionalidades">
        <div class="contenedor">
            <li><button class="btn-2" id="btnFunciones">Crear Reserva</button></li>
        </div>
    </section>

    <section class="reservas">
        <div class="overlay" id="overlay">
            <form id="reservas-formulario" class="menu">
                <select name="aulaId" id="reservas-aula-select"></select>
    
                <input name="docente" type="text" placeholder="Nombre del docente">
                <input name="curso" type="text" placeholder="Nombre del curso">
                <input name="fecha" type="date" placeholder="Fecha de reserva">
                <input name="hora" type="text" placeholder="Hora de reserva">
                <input name="motivo" type="text" placeholder="Motivo de la reserva">
    
                <button>Enviar</button>
            </form>
        </div>
        <div class="reservas-container" id="reservas-container">
            
        </div>
    </section>   
    
    <script src="../script.js"></script>
