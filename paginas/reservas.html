<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="navbar">
            <nav id="nav">
                <ul>
                    <li><a href="../index.html" class="btn-1">Gestion de Incidencias</a></li>
                    <li><a href="./gestion_aula.html" class="btn-1">Gestion de Aulas</a></li>
                    <li><a href="./reservas.html" class="btn-1 actual">Reservas</a></li>
                    <li><a href="./estadisticas.html" class="btn-1">Estadisticas</a></li>
                    <li><a href="./tareas_pendientes.html" class="btn-1">Tareas Pendientes</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <section class="funcionalidades">
        <div class="contenedor">
            <li><button class="btn-2">Crear Reserva</button></li>
        </div>
    </section>

    <section class="reservas">
        <div class="reservas-container">
            <div class="card-reservas">
                <div class="card-contenido">

                    <div class="card-campos">
                        <div class="campo">
                            <span class="campo-label">Docente</span>
                            <span class="campo-valor">Martín García</span>
                        </div>
                        <div class="campo">
                            <span class="campo-label">Curso</span>
                            <span class="campo-valor">6°1°</span>
                        </div>
                        <div class="campo">
                            <span class="campo-label">Aula</span>
                            <span class="campo-valor">Aula 10</span>
                        </div>
                        <div class="campo">
                            <span class="campo-label">Fecha</span>
                            <span class="campo-valor">24 may 2026</span>
                        </div>
                        <div class="campo">
                            <span class="campo-label">Horario</span>
                            <span class="campo-valor">8:00-10:00</span>
                        </div>
                    </div>


                    <div class="card-descripcion">
                        <span class="campo-label">Motivo</span>
                        <p>Examen</p>
                    </div>

                </div>

                <div class="card-acciones">
                    <button onclick="editarTarea()">Editar</button>
                    <button onclick="eliminarTarea()">Eliminar</button>
                </div>

            </div>
            
        </div>
    </section>   
    
    <script src="../script.js"></script>
</body>
</html>
