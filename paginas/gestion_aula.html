<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="navbar">
            <nav id="nav">
                <ul>
                    <li><a href="../index.html" class="btn-1">Gestion de Incidencias</a></li>
                    <li><a href="./gestion_aula.html" class="btn-1 actual">Gestion de Aulas</a></li>
                    <li><a href="./reservas.html" class="btn-1">Reservas</a></li>
                    <li><a href="./estadisticas.html" class="btn-1">Estadisticas</a></li>
                    <li><a href="./tareas_pendientes.html" class="btn-1">Tareas Pendientes</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <section class="funcionalidades">
        <div class="contenedor">
            <li><button class="btn-2">Crear Aula</button></li>
            <li><input type="text" class="btn-2" id="search-input" placeholder="Buscar Aula" oninput="filterAula()"></li>
            <li><select>
                <option value="">Todas las Aulas</option>
                <option value="">Aulas Disponibles</option>
                <option value="">Aulas Ocupadas</option>
                <option value="">Aulas con Incidencias Críticas.</option>
            </select></li>
        </div>
    </section>

    <section class="gestion-aula">
        <div class="gestion-aula-container">
            <div class="card-gestion-aula">
                <div class="card-contenido">

                    <div class="card-campos">
                        <div class="campo">
                            <span class="campo-label">Nombre</span>
                            <span class="campo-valor">Aula 8</span>
                        </div>
                        <div class="campo">
                            <span class="campo-label">Capacidad</span>
                            <span class="campo-valor">40 alumnos</span>
                        </div>
                        <div class="campo">
                            <span class="campo-label">Cantidad de PCs</span>
                            <span class="campo-valor">20</span>
                        </div>
                        <div class="campo">
                            <span class="campo-label">Estado General</span>
                            <span class="campo-valor">Bueno</span>
                        </div>
                        <div class="campo">
                            <span class="campo-label">Disponibilidad</span>
                            <span class="campo-valor">7:40-12:00, 13:30-15:30</span>
                        </div>
                    </div>

                </div>

                <div class="card-acciones">
                    <button onclick="editarTarea()">Editar</button>
                    <button onclick="eliminarTarea()">Eliminar</button>
                </div>

            </div>

            
        </div>
    </section>

    <script src="../script.js"></script>
</body>
</html>
