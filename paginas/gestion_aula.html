<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="navbar">
            <nav id="nav">
                <ul>
                    <li><a href="../index.html" class="btn-1">Gestion de Incidencias</a></li>
                    <li><a href="./gestion_aula.html" class="btn-1 actual">Gestion de Aulas</a></li>
                    <li><a href="./reservas.html" class="btn-1">Reservas</a></li>
                    <li><a href="./estadisticas.html" class="btn-1">Estadisticas</a></li>
                    <li><a href="./tareas_pendientes.html" class="btn-1">Tareas Pendientes</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <section class="funcionalidades">
        <div class="contenedor">
            <li><button class="btn-2" id="btnFunciones">Crear Aula</button></li>
            <li><input type="text" class="btn-2" id="search-input" placeholder="Buscar Aula" oninput="filterAula()"></li>
            <li><select>
                <option value="">Todas las Aulas</option>
                <option value="disponible">Aulas Disponibles</option>
                <option value="ocupada">Aulas Ocupadas</option>
                <option value="incidenciasCriticas">Aulas con Incidencias Críticas.</option>
            </select></li>
        </div>
    </section>

    <section class="gestion-aula">
        <div class="overlay" id="overlay">
            <form id="aulas-formulario" class="menu">
                <input name="nombre" type="text" placeholder="Nombre de la aula">
                <input name="capacidad" type="text" placeholder="Capacidad">
                <input name="cantidad" type="text" placeholder="Cantidad">
                <select name="estado" id="estado">
                    <option value="disponible">Disponible</option>
                    <option value="ocupado">Ocupada</option>
                </select>
                <select id="prioridad" name="disponibilidad">
                    <option value="baja">Baja</option>
                    <option value="media">Medio</option>
                    <option value="alta">Alta</option>
                    <option value="urgente">Urgente</option>
                </select>
    
                <button>Enviar</button>
            </form>
        </div>
        <div class="gestion-aula-container" id="aulas-container">
            
        </div>
    </section>

    <script src="../script.js"></script>
</body>
</html>
