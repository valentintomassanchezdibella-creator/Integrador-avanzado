<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="navbar">
            <nav id="nav">
                <ul>
                    <li><a href="index.html" class="btn-1 actual">Gestion de Incidencias</a></li>
                    <li><a href="paginas/gestion_aula.html" class="btn-1">Gestion de Aulas</a></li>
                    <li><a href="paginas/reservas.html" class="btn-1">Reservas</a></li>
                    <li><a href="paginas/estadisticas.html" class="btn-1">Estadisticas</a></li>
                    <li><a href="paginas/tareas_pendientes.html" class="btn-1">Tareas Pendientes</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <section class="funcionalidades">
        <div class="contenedor">
            <li><button class="btn-2" id="btnFunciones">Crear Incidencia</button></li>
            <li><input type="text" class="btn-2" id="search-input" placeholder="Buscar incidencia" oninput="filterIncidencia()"></li>
            <li><input type="text" class="btn-2" id="search-aula" placeholder="Buscar Aula" oninput="filterAula()"></li>
            <li><select>
                <option value="">Todos los Estados</option>
                <option value="pendiente">Pendiente</option>
                <option value="en proceso">En proceso</option>
                <option value="resuelta">Resuelta</option>
            </select></li>
            <li><select id="prioridad" name="">
                <option value="">Todas las prioridades</option>
                <option value="baja">Baja</option>
                <option value="medio">Medio</option>
                <option value="alta">Alta</option>
                <option value="urgente">Urgente</option>
            </select></li>
        </div>
    </section>

    <section class="incidencias">
        <div class="overlay" id="overlay">
            <form id="incidencias-formulario">
                <select name="aulaId" id="incidencia-aula-select">
    
                </select>
                <input name="responsable" type="text" placeholder="Responsable">
                <input name="tipo" type="text" placeholder="Tipo">
                <input name="descripcion" type="text" placeholder="Descripción">
                <input name="fecha" type="text" placeholder="Fecha">
                <select name="estado" id="estado">
                    <option value="pendiente">Pendiente</option>
                    <option value="proceso">En proceso</option>
                    <option value="resuelta">Resuelta</option>
                </select>
                <select id="prioridad" name="prioridad">
                    <option value="baja">Baja</option>
                    <option value="media">Medio</option>
                    <option value="alta">Alta</option>
                    <option value="urgente">Urgente</option>
                </select>
    
                <button>Enviar</button>
            </form>
        </div>
        <div class="incidencias-container" id="incidencias-container">

        </div>
    </section>    
    

    <script src="script.js"></script>
</body>
</html>
